<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- Tessera mark — 3×3 mosaic. Tiles span edge-to-edge (no outer padding)
       so the figure stays legible when browsers shrink the favicon to 16px. -->
  <rect x="0"  y="0"  width="11" height="11" fill="#D97757"/>
  <rect x="12" y="0"  width="11" height="11" fill="#EDEBE0"/>
  <rect x="12" y="12" width="11" height="11" fill="#1F1E1B"/>
  <rect x="24" y="12" width="11" height="11" fill="#EDEBE0"/>
  <rect x="12" y="24" width="11" height="11" fill="#EDEBE0"/>
  <rect x="24" y="24" width="11" height="11" fill="#6B8E6B"/>
</svg>
