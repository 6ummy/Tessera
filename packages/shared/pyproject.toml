[project]
name = "tessera-shared"
version = "0.1.0"
description = "Shared Pydantic schemas, persona loader, and Alpaca adapter"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tessera_shared"]
